<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MTP Admin — Головна</title>
<link rel="stylesheet" href="css/admin.css">
<style>
.welcome{margin-bottom:32px}
.welcome h1{font-size:28px;font-weight:700;margin-bottom:4px}
.welcome p{color:#888;font-size:14px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.tile{display:block;padding:32px 28px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;text-decoration:none;color:#333;transition:all .2s;position:relative;overflow:hidden}
.tile:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:#000;transform:translateY(-2px)}
.tile-icon{font-size:36px;margin-bottom:16px}
.tile h3{font-size:18px;font-weight:600;margin-bottom:6px}
.tile p{font-size:13px;color:#888;line-height:1.5}
.tile-locked{opacity:.35;pointer-events:none;filter:grayscale(1)}
.tile-locked::after{content:'Немає доступу';position:absolute;top:12px;right:12px;background:#f5f5f5;color:#999;padding:3px 10px;border-radius:20px;font-size:11px}
.tile-badge{position:absolute;top:12px;right:12px;background:#e63329;color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<nav class="admin-nav">
<div class="admin-nav-inner">
<div class="admin-logo"><span class="admin-logo-mtp">MTP</span> GROUP <span class="admin-logo-sub">ADMIN</span></div>
<div class="admin-links" id="navLinks"></div>
<button class="admin-logout" onclick="logout()">Вийти</button>
</div>
</nav>

<main class="admin-main">
<div class="welcome">
<h1 id="welcomeTitle">Вітаємо!</h1>
<p id="welcomeRole"></p>
</div>

<div class="tiles" id="tilesContainer"></div>
</main>

<script src="js/auth.js"></script>
<script>
checkAuth();

var ALL_SECTIONS = [
  {id:'crm',       href:'crm.html',       icon:'&#128203;', title:'CRM',          desc:'Ліди, канбан, клієнти'},
  {id:'dashboard', href:'stats.html',      icon:'&#128202;', title:'Статистика',   desc:'Графіки, воронка, KPI'},
  {id:'seo',       href:'seo.html',        icon:'&#128270;', title:'SEO',           desc:'Позиції, запити, індексація'},
  {id:'content',   href:'articles.html',   icon:'&#128221;', title:'Статті',        desc:'Блог, контент'},
  {id:'users',     href:'users.html',      icon:'&#128101;', title:'Команда',       desc:'Користувачі, ролі'},
  {id:'settings',  href:'#',              icon:'&#9881;',   title:'Налаштування', desc:'Сайт, інтеграції'},
];

var user = getUser();
var userName = user.name || 'Користувач';
var userRole = user.role || 'user';
var userPerms = user.permissions || [];

// Welcome
document.getElementById('welcomeTitle').textContent = 'Вітаємо, ' + userName + '!';
document.getElementById('welcomeRole').textContent = userRole === 'admin' ? 'Адміністратор — повний доступ' : 'Менеджер — обмежений доступ';

// Build nav — only show accessible links
var navHtml = '';
ALL_SECTIONS.forEach(function(s){
  var allowed = userRole === 'admin' || userPerms.indexOf(s.id) !== -1;
  if(allowed) navHtml += '<a href="' + s.href + '">' + s.title + '</a>';
});
document.getElementById('navLinks').innerHTML = navHtml;

// Build tiles
var tilesHtml = '';
ALL_SECTIONS.forEach(function(s){
  var allowed = userRole === 'admin' || userPerms.indexOf(s.id) !== -1;
  var cls = allowed ? 'tile' : 'tile tile-locked';
  var tag = allowed ? '<a href="' + s.href + '"' : '<div';
  var tagEnd = allowed ? '</a>' : '</div>';
  tilesHtml += tag + ' class="' + cls + '">' +
    '<div class="tile-icon">' + s.icon + '</div>' +
    '<h3>' + s.title + '</h3>' +
    '<p>' + s.desc + '</p>' +
    tagEnd;
});
document.getElementById('tilesContainer').innerHTML = tilesHtml;
</script>
</body>
</html>
