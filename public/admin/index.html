<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MTP Admin — Вхід</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',Arial,sans-serif;background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;padding:48px 40px;border-radius:16px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:1px}
.logo span{background:#e63329;color:#fff;padding:3px 10px;border-radius:4px}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
h1{font-size:22px;font-weight:700;margin:16px 0 4px}
input{width:100%;padding:14px 18px;border:1px solid #e0e0e0;border-radius:8px;font-size:15px;margin-bottom:12px;outline:none;transition:border-color .2s;font-family:inherit}
input:focus{border-color:#000;box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.btn{width:100%;padding:14px;background:#e63329;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px;font-family:inherit}
.btn:hover{background:#c42a22}
.error{color:#e63329;font-size:13px;margin-top:12px;display:none}
.footer-note{color:#444;font-size:12px;margin-top:24px}
@media(max-width:480px){.login-card{padding:32px 24px;margin:16px;border-radius:12px}}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script>if(location.hostname==='fulfillmentmtp.com.ua')location.href=location.href.replace('://fulfillmentmtp','://www.fulfillmentmtp');</script>
</head>
<body>
<div class="login-card">
<div class="logo"><span>MTP</span> GROUP</div>
<h1>Панель адміністратора</h1>
<p class="subtitle">Введіть дані для входу</p>
<form onsubmit="handleLogin(event)">
<input type="text" id="login" placeholder="Логін" autocomplete="username" required>
<input type="password" id="password" placeholder="Пароль" autocomplete="current-password" required>
<button type="submit" class="btn">Увійти</button>
</form>
<div id="loginError" class="error"></div>
<p class="footer-note">MTP Group Fulfillment © 2026</p>
</div>
<script src="js/auth.js"></script>
</body>
</html>
