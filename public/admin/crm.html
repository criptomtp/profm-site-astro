<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MTP Admin — CRM</title>
<link rel="stylesheet" href="css/admin.css">
<style>
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;min-height:50vh}
.kanban-col{min-width:190px;flex:1;background:#f5f5f5;border-radius:8px;display:flex;flex-direction:column}
.kanban-header{padding:10px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #000}
.kanban-count{background:#000;color:#fff;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.kanban-body{padding:6px;flex:1;display:flex;flex-direction:column;gap:6px}
.kanban-card{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:12px;cursor:pointer;transition:box-shadow .2s}
.kanban-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kc-company{font-weight:700;font-size:14px;margin-bottom:2px}
.kc-contact{font-size:13px;color:#666}
.kc-meta{font-size:12px;color:#999;margin-top:4px}
.lead-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:200;overflow-y:auto;padding:40px 16px}
.lead-modal.show{display:flex}
.lead-card{background:#fff;border-radius:12px;width:100%;max-width:700px;margin:auto}
.lead-card-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #e0e0e0}
.lead-card-header h2{font-size:18px;margin:0}
.lead-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888}
.lead-card-body{padding:24px;max-height:70vh;overflow-y:auto}
.lead-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.lead-card-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid #e0e0e0}
.comment{padding:10px;background:#f9f9f9;border-radius:6px;margin-bottom:8px}
.comment-date{font-size:11px;color:#999}
.comment-text{font-size:14px;margin-top:4px;white-space:pre-wrap;word-break:break-word}
.comment-add textarea{width:100%;min-height:80px;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;font-size:14px;resize:vertical}
.files-section{margin-top:16px;padding-top:16px;border-top:1px solid #e0e0e0}
.file-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#f5f5f5;border-radius:6px;font-size:13px;margin:4px 4px 4px 0;text-decoration:none;color:#333}
.file-link:hover{background:#e0e0e0}
.file-add{display:flex;gap:8px;margin-top:8px}
.file-add input{flex:1}
.calendly-section{margin-top:16px;padding-top:16px;border-top:1px solid #e0e0e0}
.calendly-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#006bff;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;transition:background .2s}
.calendly-btn:hover{background:#0052cc}
@media(max-width:768px){.kanban{flex-direction:column}.kanban-col{min-width:100%}.lead-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="admin-nav">
<div class="admin-nav-inner">
<div class="admin-logo"><span class="admin-logo-mtp">MTP</span> GROUP <span class="admin-logo-sub">ADMIN</span></div>
<div class="admin-links">
<a href="dashboard.html">Дашборд</a>
<a href="seo.html">SEO</a>
<a href="articles.html">Контент</a>
<a href="crm.html" class="active">CRM</a>
<a href="users.html">Команда</a>
</div>
<button class="admin-logout" onclick="logout()">Вийти</button>
</div>
</nav>

<main class="admin-main">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
<h1 class="admin-title" style="margin-bottom:0">CRM — Заявки</h1>
<div style="display:flex;gap:8px">
<button class="btn btn-outline" onclick="exportCSV()">Експорт CSV</button>
<button class="btn btn-primary" onclick="openNewLead()">+ Нова заявка</button>
</div>
</div>

<div class="cards-row" id="crmStats"></div>

<div class="kanban">
<div class="kanban-col" id="col-new"><div class="kanban-header" style="border-color:#2196f3">Нові <span class="kanban-count">0</span></div><div class="kanban-body"></div></div>
<div class="kanban-col" id="col-contact"><div class="kanban-header" style="border-color:#ff9800">Контакт <span class="kanban-count">0</span></div><div class="kanban-body"></div></div>
<div class="kanban-col" id="col-meeting"><div class="kanban-header" style="border-color:#00bcd4">Зустріч <span class="kanban-count">0</span></div><div class="kanban-body"></div></div>
<div class="kanban-col" id="col-negotiations"><div class="kanban-header" style="border-color:#9c27b0">Переговори <span class="kanban-count">0</span></div><div class="kanban-body"></div></div>
<div class="kanban-col" id="col-onboarding"><div class="kanban-header" style="border-color:#4caf50">Онбординг <span class="kanban-count">0</span></div><div class="kanban-body"></div></div>
<div class="kanban-col" id="col-clients"><div class="kanban-header" style="border-color:#000">Клієнти <span class="kanban-count">0</span></div><div class="kanban-body"></div></div>
</div>
</main>

<!-- LEAD MODAL -->
<div class="lead-modal" id="leadModal">
<div class="lead-card">
<div class="lead-card-header"><h2 id="lmTitle">Деталі заявки</h2><button class="lead-close" onclick="closeLead()">&times;</button></div>
<div class="lead-card-body">
<div class="lead-row"><div class="form-group"><label>Компанія</label><input type="text" id="lmCompany"></div><div class="form-group"><label>Контакт</label><input type="text" id="lmContact"></div></div>
<div class="lead-row"><div class="form-group"><label>Телефон</label><input type="tel" id="lmPhone"></div><div class="form-group"><label>Email</label><input type="email" id="lmEmail"></div></div>
<div class="lead-row"><div class="form-group"><label>Відправлень/день</label><input type="number" id="lmShipments"></div><div class="form-group"><label>Тип товару</label><select id="lmType"><option value="heavy">Важкі товари</option><option value="cosmetics">Косметика</option><option value="clothing">Одяг/взуття</option><option value="electronics">Електроніка</option><option value="food">Продукти</option><option value="other">Інше</option></select></div></div>
<div class="lead-row"><div class="form-group"><label>Джерело</label><select id="lmSource"><option value="site">Сайт</option><option value="telegram">Telegram</option><option value="call">Дзвінок</option><option value="recommendation">Рекомендація</option><option value="ads">Реклама</option><option value="other">Інше</option></select></div><div class="form-group"><label>Статус</label><select id="lmStatus"><option value="new">Нова</option><option value="contact">Контакт</option><option value="meeting">Зустріч призначена</option><option value="negotiations">Переговори</option><option value="onboarding">Онбординг</option><option value="clients">Клієнт</option><option value="not_target">Не наша ЦА</option><option value="buyout">Викуп товару</option></select></div></div>

<!-- Telegram -->
<div class="lead-row">
<div class="form-group"><label>💬 Telegram</label><input type="text" id="lmTelegram" placeholder="@username або номер"><div style="margin-top:4px"><a id="lmTgLink" href="#" target="_blank" style="font-size:12px;color:#0088cc">Відкрити чат →</a></div></div>
<div class="form-group"><label>👥 Робоча група TG</label><input type="text" id="lmTelegramGroup" placeholder="https://t.me/+invite_link"><div style="margin-top:4px"><a id="lmTgGroupLink" href="#" target="_blank" style="font-size:12px;color:#0088cc">Відкрити групу →</a></div></div>
</div>

<!-- Calendly -->
<div class="calendly-section">
<h4 style="font-size:14px;margin-bottom:8px">📅 Зустріч / Google Meet</h4>
<div class="lead-row">
<div class="form-group"><label>Дата зустрічі</label><input type="datetime-local" id="lmMeetingDate"></div>
<div class="form-group"><label>Посилання Google Meet</label><input type="url" id="lmMeetingLink" placeholder="https://meet.google.com/..."></div>
</div>
<button class="calendly-btn" onclick="window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text=MTP+Group+—+'+encodeURIComponent(document.getElementById('lmCompany').value)+'&dates='+getMeetingDates()+'&details='+encodeURIComponent('Контакт: '+document.getElementById('lmContact').value+'\nТел: '+document.getElementById('lmPhone').value),'_blank')">📅 Створити подію в Google Calendar</button>
</div>

<!-- Files / Links -->
<div class="files-section">
<h4 style="font-size:14px;margin-bottom:8px">📎 Файли та посилання</h4>
<div id="lmFiles"></div>
<div class="file-add">
<input type="text" id="lmNewFile" placeholder="Посилання на Google Drive, КП, договір...">
<button class="btn btn-outline btn-sm" onclick="addFile()">Додати</button>
</div>
</div>

<!-- Comments -->
<div style="margin-top:16px;padding-top:16px;border-top:1px solid #e0e0e0">
<h4 style="font-size:14px;margin-bottom:8px">💬 Коментарі</h4>
<div id="lmComments"></div>
<div class="comment-add">
<textarea id="lmNewComment" placeholder="Напишіть коментар... (підтримує багато тексту)"></textarea>
<div style="text-align:right;margin-top:8px"><button class="btn btn-outline btn-sm" onclick="addCommentOnly()">Додати коментар</button></div>
</div>
</div>
</div>
<div class="lead-card-footer">
<button class="btn btn-outline" onclick="deleteLead()" style="color:#e63329">Видалити</button>
<button class="btn btn-primary" onclick="saveLead()">Зберегти все</button>
</div>
</div>
</div>

<!-- NEW LEAD MODAL -->
<div class="lead-modal" id="newLeadModal">
<div class="lead-card">
<div class="lead-card-header"><h2>Нова заявка</h2><button class="lead-close" onclick="closeNewLead()">&times;</button></div>
<div class="lead-card-body">
<div class="lead-row"><div class="form-group"><label>Компанія</label><input type="text" id="nlCompany"></div><div class="form-group"><label>Контакт</label><input type="text" id="nlContact"></div></div>
<div class="lead-row"><div class="form-group"><label>Телефон</label><input type="tel" id="nlPhone"></div><div class="form-group"><label>Email</label><input type="email" id="nlEmail"></div></div>
<div class="lead-row"><div class="form-group"><label>Відправлень/день</label><input type="number" id="nlShipments"></div><div class="form-group"><label>Тип</label><select id="nlType"><option value="other">Інше</option><option value="heavy">Важкі</option><option value="cosmetics">Косметика</option><option value="clothing">Одяг</option><option value="electronics">Електроніка</option></select></div></div>
<div class="form-group"><label>Джерело</label><select id="nlSource"><option value="site">Сайт</option><option value="telegram">Telegram</option><option value="call">Дзвінок</option><option value="recommendation">Рекомендація</option><option value="ads">Реклама</option></select></div>
</div>
<div class="lead-card-footer"><button class="btn btn-outline" onclick="closeNewLead()">Скасувати</button><button class="btn btn-primary" onclick="saveNewLead()">Створити</button></div>
</div>
</div>

<script src="js/auth.js"></script>
<script src="js/crm.js"></script>
<script>checkAuth();
if(!hasPermission('crm')){alert('Немає доступу');window.location.href='/admin/dashboard.html';}
// Hide nav links without permission
(function(){
  var user=getUser();
  var perms=user.permissions||[];
  var map={'dashboard.html':'dashboard','crm.html':'crm','seo.html':'seo','articles.html':'content','users.html':'users'};
  document.querySelectorAll('.admin-links a').forEach(function(a){
    var href=a.getAttribute('href');
    var p=map[href];
    if(p && perms.indexOf(p)===-1) a.style.display='none';
  });
})();
</script>
</body>
</html>
