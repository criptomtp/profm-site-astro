<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MTP Admin — CRM</title>
<link rel="stylesheet" href="css/admin.css">
<style>
/* KANBAN */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:60vh}
.kanban-col{min-width:240px;flex:1;background:#f5f5f5;border-radius:8px;display:flex;flex-direction:column}
.kanban-header{padding:12px 16px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #000}
.kanban-count{background:#000;color:#fff;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.kanban-body{padding:8px;flex:1;display:flex;flex-direction:column;gap:8px}
.kanban-card{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:14px;cursor:pointer;transition:box-shadow .2s}
.kanban-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kc-company{font-weight:700;font-size:14px;margin-bottom:2px}
.kc-contact{font-size:13px;color:#666;margin-bottom:6px}
.kc-meta{font-size:11px;color:#999;letter-spacing:.3px}
.kc-progress{height:4px;background:#e0e0e0;border-radius:2px;margin-top:8px}
.kc-progress-bar{height:100%;background:#4caf50;border-radius:2px;transition:width .3s}
.kc-progress-text{font-size:11px;color:#888;margin-top:2px}

/* LEAD MODAL */
.lead-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:200;overflow-y:auto;padding:40px 16px}
.lead-modal.show{display:flex}
.lead-card{background:#fff;border-radius:12px;width:100%;max-width:620px;margin:auto}
.lead-card-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #e0e0e0}
.lead-card-header h2{font-size:18px}
.lead-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888;padding:4px 8px}
.lead-close:hover{color:#000}
.lead-card-body{padding:24px}
.lead-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.lead-row .form-group{margin-bottom:0}

/* ONBOARDING */
.ob-step{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;cursor:pointer}
.ob-step input{width:16px;height:16px;accent-color:#4caf50}
.ob-progress{font-size:12px;color:#888;margin-top:4px}

/* COMMENTS */
.comments-section{border-top:1px solid #e0e0e0;padding-top:16px;margin-top:16px}
.comments-section h4{font-size:14px;margin-bottom:8px}
.comment{padding:8px 0;border-bottom:1px solid #f0f0f0}
.comment-date{font-size:11px;color:#999}
.comment-text{font-size:13px;margin-top:2px}
.comment-add{display:flex;gap:8px;margin-top:8px}
.comment-add input{flex:1}

/* NOTIFY */
.notify-section{border-top:1px solid #e0e0e0;padding-top:16px;margin-top:16px}
.notify-section h4{font-size:14px;margin-bottom:8px}
.notify-row{display:flex;gap:8px;align-items:flex-end}
.notify-row select,.notify-row input{flex:1}

.lead-card-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid #e0e0e0}

@media(max-width:768px){
.kanban{flex-direction:column}
.kanban-col{min-width:100%}
.lead-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav class="admin-nav">
<div class="admin-nav-inner">
<div class="admin-logo"><span class="admin-logo-mtp">MTP</span> GROUP <span class="admin-logo-sub">ADMIN</span></div>
<div class="admin-links">
<a href="dashboard.html">Дашборд</a>
<a href="seo.html">SEO</a>
<a href="articles.html">Статті</a>
<a href="crm.html" class="active">CRM</a>
</div>
<button class="admin-logout" onclick="logout()">Вийти</button>
</div>
</nav>

<main class="admin-main">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
<h1 class="admin-title" style="margin-bottom:0">CRM — Заявки</h1>
<button class="btn btn-primary" onclick="openNewLead()">+ Нова заявка</button>
</div>

<div class="cards-row" id="crmStats"></div>

<div class="kanban">
<div class="kanban-col" id="col-new">
<div class="kanban-header" style="border-color:#2196f3">Нові <span class="kanban-count" style="background:#2196f3">0</span></div>
<div class="kanban-body"></div>
</div>
<div class="kanban-col" id="col-contact">
<div class="kanban-header" style="border-color:#ff9800">Контакт <span class="kanban-count" style="background:#ff9800">0</span></div>
<div class="kanban-body"></div>
</div>
<div class="kanban-col" id="col-negotiations">
<div class="kanban-header" style="border-color:#9c27b0">Переговори <span class="kanban-count" style="background:#9c27b0">0</span></div>
<div class="kanban-body"></div>
</div>
<div class="kanban-col" id="col-onboarding">
<div class="kanban-header" style="border-color:#4caf50">Онбординг <span class="kanban-count" style="background:#4caf50">0</span></div>
<div class="kanban-body"></div>
</div>
<div class="kanban-col" id="col-clients">
<div class="kanban-header" style="border-color:#000">Клієнти <span class="kanban-count">0</span></div>
<div class="kanban-body"></div>
</div>
</div>

<div style="text-align:center;margin-top:24px">
<button class="btn btn-outline" onclick="openSettings()">&#9881; Налаштування CRM</button>
</div>
</main>

<!-- LEAD MODAL -->
<div class="lead-modal" id="leadModal">
<div class="lead-card">
<div class="lead-card-header">
<h2>Деталі заявки</h2>
<button class="lead-close" onclick="closeLead()">&times;</button>
</div>
<div class="lead-card-body">
<div class="lead-row">
<div class="form-group"><label>Компанія</label><input type="text" id="lmCompany"></div>
<div class="form-group"><label>Контакт</label><input type="text" id="lmContact"></div>
</div>
<div class="lead-row">
<div class="form-group"><label>Телефон</label><input type="tel" id="lmPhone"></div>
<div class="form-group"><label>Email</label><input type="email" id="lmEmail"></div>
</div>
<div class="lead-row">
<div class="form-group"><label>Відправлень/день</label><input type="number" id="lmShipments"></div>
<div class="form-group"><label>Тип товару</label>
<select id="lmType"><option value="heavy">Важкі товари</option><option value="cosmetics">Косметика</option><option value="clothing">Одяг/взуття</option><option value="electronics">Електроніка</option><option value="food">Продукти</option><option value="other">Інше</option></select>
</div>
</div>
<div class="lead-row">
<div class="form-group"><label>Джерело</label>
<select id="lmSource"><option value="site">Сайт</option><option value="telegram">Telegram</option><option value="call">Дзвінок</option><option value="recommendation">Рекомендація</option><option value="ads">Реклама</option><option value="other">Інше</option></select>
</div>
<div class="form-group"><label>Статус</label>
<select id="lmStatus"><option value="new">Нова</option><option value="contact">Контакт</option><option value="negotiations">Переговори</option><option value="onboarding">Онбординг</option><option value="clients">Клієнт</option></select>
</div>
</div>

<div style="margin-top:16px">
<h4 style="font-size:14px;margin-bottom:8px">Онбординг <span class="ob-progress" id="lmObProgress"></span></h4>
<div id="lmOnboarding"></div>
</div>

<div class="comments-section">
<h4>Коментарі</h4>
<div id="lmComments"></div>
<div class="comment-add">
<input type="text" id="lmNewComment" placeholder="Додати коментар...">
</div>
</div>

<div class="notify-section">
<h4>Надіслати сповіщення</h4>
<div class="notify-row">
<select id="lmNotifyChannel"><option value="telegram">Telegram бот</option><option value="email">Email</option></select>
<input type="text" id="lmNotifyText" placeholder="Текст (або авто)">
<button class="btn btn-sm btn-secondary" onclick="sendNotification()">Надіслати</button>
</div>
</div>
</div>
<div class="lead-card-footer">
<button class="btn btn-outline" onclick="deleteLead()">Видалити</button>
<button class="btn btn-primary" onclick="saveLead()">Зберегти</button>
</div>
</div>
</div>

<!-- NEW LEAD MODAL -->
<div class="lead-modal" id="newLeadModal">
<div class="lead-card">
<div class="lead-card-header">
<h2>Нова заявка</h2>
<button class="lead-close" onclick="closeNewLead()">&times;</button>
</div>
<div class="lead-card-body">
<div class="lead-row">
<div class="form-group"><label>Компанія</label><input type="text" id="nlCompany" required></div>
<div class="form-group"><label>Контакт</label><input type="text" id="nlContact"></div>
</div>
<div class="lead-row">
<div class="form-group"><label>Телефон</label><input type="tel" id="nlPhone"></div>
<div class="form-group"><label>Email</label><input type="email" id="nlEmail"></div>
</div>
<div class="lead-row">
<div class="form-group"><label>Відправлень/день</label><input type="number" id="nlShipments"></div>
<div class="form-group"><label>Тип товару</label>
<select id="nlType"><option value="heavy">Важкі товари</option><option value="cosmetics">Косметика</option><option value="clothing">Одяг/взуття</option><option value="electronics">Електроніка</option><option value="food">Продукти</option><option value="other">Інше</option></select>
</div>
</div>
<div class="lead-row">
<div class="form-group"><label>Джерело</label>
<select id="nlSource"><option value="site">Сайт</option><option value="telegram">Telegram</option><option value="call">Дзвінок</option><option value="recommendation">Рекомендація</option><option value="ads">Реклама</option><option value="other">Інше</option></select>
</div>
<div class="form-group"></div>
</div>
</div>
<div class="lead-card-footer">
<button class="btn btn-outline" onclick="closeNewLead()">Скасувати</button>
<button class="btn btn-primary" onclick="saveNewLead()">Створити</button>
</div>
</div>
</div>

<!-- SETTINGS MODAL -->
<div class="lead-modal" id="settingsModal">
<div class="lead-card">
<div class="lead-card-header">
<h2>&#9881; Налаштування CRM</h2>
<button class="lead-close" onclick="closeSettings()">&times;</button>
</div>
<div class="lead-card-body">
<div class="form-group"><label>Telegram Bot Token</label><input type="password" id="stTgToken" placeholder="123456:ABC-DEF..."></div>
<div class="form-group"><label>Telegram Chat ID</label><input type="text" id="stTgChat" placeholder="-1001234567890"></div>
<div class="form-group"><label>Email для сповіщень</label><input type="email" id="stEmail" placeholder="manager@mtpgroup.com.ua"></div>
</div>
<div class="lead-card-footer">
<button class="btn btn-outline" onclick="closeSettings()">Скасувати</button>
<button class="btn btn-primary" onclick="saveSettingsForm()">Зберегти</button>
</div>
</div>
</div>

<script src="js/auth.js"></script>
<script src="js/crm.js"></script>
<script>checkAuth();renderBoard();</script>
</body>
</html>
